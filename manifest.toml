name = "@plugin/object-store"
version = "0.1.0"
module = "lazuli.dev/plugin/object-store"
description = "S3/MinIO object-store adapter — wraps aws-sdk-go-v2/service/s3"

# Provides the storage.ObjectStore contract (lazuli.dev/runtime/lazuli/storage).
# Works against AWS S3, MinIO, Cloudflare R2, Tigris, Backblaze B2.
implements = ["storage.ObjectStore"]

[env]
required = ["S3_BUCKET_DEFAULT"]
optional = [
  "S3_ENDPOINT",
  "S3_REGION",
  "S3_ACCESS_KEY_ID",
  "S3_SECRET_ACCESS_KEY",
  "S3_FORCE_PATH_STYLE",
]
